spring:
  application:
    name: timi-backend
  datasource:
    url: jdbc:mysql://localhost:3306/timi_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 457101825
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: your-super-secret-key-change-this-in-production-environment-12345678
  expiration: 2592000000  # 30 days in milliseconds

logging:
  level:
    root: INFO
    com.timi: DEBUG
    org.springframework.security: DEBUG
